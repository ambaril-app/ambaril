name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @ambaril/web tsc --noEmit

      - name: Lint
        run: pnpm --filter @ambaril/web lint

      - name: Unit tests
        run: pnpm --filter @ambaril/web test

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm --filter @ambaril/web test:e2e
        continue-on-error: true

      - name: Build
        run: pnpm --filter @ambaril/web build
