# Ambaril Project Manifest — required by feature-* skills
# See ARATAR-SETUP.md §21 for full context

project: ambaril
description: Multi-tenant SaaS ERP for fashion/textile industry
stack: Next.js 15, TypeScript, Drizzle ORM, Neon Postgres, Vercel

ceremony: auto
# auto: infers from spec change_class
# low → light, medium/cross-module → standard, critical/agent-tool → full

paths:
  specs: docs/specs
  cycles: docs/cycles
  insights: docs/INSIGHTS.md
  handoffs: docs/handoffs
  pitches: docs/pitches
  plans: docs/plans

checks:
  type_check: "pnpm --filter @ambaril/web tsc --noEmit"
  lint: "pnpm --filter @ambaril/web lint"
  test: "pnpm --filter @ambaril/web test"
  test_fast: "pnpm --filter @ambaril/web test"
  test_full: "pnpm --filter @ambaril/web test"
  build: "pnpm --filter @ambaril/web build"
  security_scan: null # TODO: add after P2.7
  state_scan: null # TODO: add after P2.9
  state_scan_cwd: null
  ci: null # TODO: add after P1.2 (GitHub Actions)
conventions:
  copy_language: pt-BR
  conversation_language: en
  multi_tenant: true
  test_enforcement: hard
  design_lab: false
  change_safety_classes: []

docs:
  auth: null # TODO: create auth conventions doc
  database: null # TODO: create database conventions doc
  api: null # TODO: create API conventions doc
  change_safety: null # TODO: create change safety doc
  security_checklist: null
  design_companion: null
  design_system: null
  implementation: null
  release_checklist: null
  release_approval: null
  review_protocol: null

quality:
  critical_journeys:
    - "user login and tenant selection"
    - "product creation with variants"
    - "order placement and payment"
  implementation_pilot:
    enabled: true
    first_n_runs: 10
    log_path: docs/pilot-log.md
    blocker_categories:
      - "type-check failure"
      - "test failure"
      - "lint failure"
      - "scope creep"
    thresholds:
      same_issue_count: 2
